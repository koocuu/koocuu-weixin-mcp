name: Deploy Tencent SCF

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  SCF_REGION: ap-hongkong
  SCF_NAMESPACE: default
  SCF_FUNCTION_NAME: koocuu-weixin-mcp
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_IMAGE_NAME: koocuu-weixin-mcp

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Validate deployment settings
        env:
          TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE }}
        run: |
          test -n "$TCR_NAMESPACE" || (echo "Missing repository variable TCR_NAMESPACE" && exit 1)

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and push image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.TCR_REGISTRY }}/${{ vars.TCR_NAMESPACE }}/${{ env.TCR_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.TCR_REGISTRY }}/${{ vars.TCR_NAMESPACE }}/${{ env.TCR_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tencent Cloud CLI
        run: pip install tccli

      - name: Create or update SCF
        env:
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
          TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE }}
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_TOKEN: ${{ secrets.WECHAT_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          IMAGE_URI="$TCR_REGISTRY/$TCR_NAMESPACE/$TCR_IMAGE_NAME:${GITHUB_SHA}@${{ steps.image.outputs.digest }}"
          IMAGE_CONFIG=$(jq -cn --arg uri "$IMAGE_URI" '{ImageType:"personal",ImageUri:$uri,ImagePort:9000}')
          CODE=$(jq -cn --argjson image "$IMAGE_CONFIG" '{ImageConfig:$image}')
          ENVIRONMENT=$(jq -cn \
            --arg base "https://weixin.koocuu.com" \
            --arg bearer "$MCP_BEARER_TOKEN" \
            --arg appId "$WECHAT_APP_ID" \
            --arg appSecret "$WECHAT_APP_SECRET" \
            --arg callbackToken "$WECHAT_TOKEN" \
            --arg redisUrl "$UPSTASH_REDIS_REST_URL" \
            --arg redisToken "$UPSTASH_REDIS_REST_TOKEN" \
            '{Variables:[
              {Key:"PUBLIC_BASE_URL",Value:$base},
              {Key:"MCP_BEARER_TOKEN",Value:$bearer},
              {Key:"WECHAT_APP_ID",Value:$appId},
              {Key:"WECHAT_APP_SECRET",Value:$appSecret},
              {Key:"WECHAT_TOKEN",Value:$callbackToken},
              {Key:"WECHAT_MESSAGE_MODE",Value:"plain"},
              {Key:"WECHAT_ENABLE_PUBLISH",Value:"false"},
              {Key:"UPSTASH_REDIS_REST_URL",Value:$redisUrl},
              {Key:"UPSTASH_REDIS_REST_TOKEN",Value:$redisToken}
            ]}')
          PUBLIC_NET='{"PublicNetStatus":"ENABLE","EipConfig":{"EipStatus":"ENABLE"}}'

          tccli configure set secretId "$TENCENTCLOUD_SECRET_ID"
          tccli configure set secretKey "$TENCENTCLOUD_SECRET_KEY"
          tccli configure set region "$SCF_REGION"

          if tccli scf GetFunction --FunctionName "$SCF_FUNCTION_NAME" --Namespace "$SCF_NAMESPACE" >/dev/null 2>&1; then
            tccli scf UpdateFunctionCode \
              --FunctionName "$SCF_FUNCTION_NAME" \
              --Namespace "$SCF_NAMESPACE" \
              --CodeSource Image \
              --ImageConfig "$IMAGE_CONFIG"
          else
            tccli scf CreateFunction \
              --FunctionName "$SCF_FUNCTION_NAME" \
              --Namespace "$SCF_NAMESPACE" \
              --Description "Koocuu Weixin remote MCP" \
              --Type HTTP \
              --Runtime CustomImage \
              --CodeSource Image \
              --Code "$CODE" \
              --MemorySize 512 \
              --Timeout 60 \
              --InitTimeout 30 \
              --PublicNetConfig "$PUBLIC_NET" \
              --Environment "$ENVIRONMENT"
          fi

          tccli scf UpdateFunctionConfiguration \
            --FunctionName "$SCF_FUNCTION_NAME" \
            --Namespace "$SCF_NAMESPACE" \
            --MemorySize 512 \
            --Timeout 60 \
            --InitTimeout 30 \
            --PublicNetConfig "$PUBLIC_NET" \
            --Environment "$ENVIRONMENT"

      - name: Ensure public Function URL exists
        id: function_url
        env:
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
        run: |
          if ! tccli scf ListTriggers --FunctionName "$SCF_FUNCTION_NAME" --Namespace "$SCF_NAMESPACE" | jq -e '.Triggers | any(.Type == "http")' >/dev/null; then
            TRIGGER_DESC='{"AuthType":"NONE","NetConfig":{"EnableIntranet":false,"EnableExtranet":true},"CorsConfig":{"Enable":false,"Origins":[],"Methods":[]}}'
            tccli scf CreateTrigger \
              --FunctionName "$SCF_FUNCTION_NAME" \
              --Namespace "$SCF_NAMESPACE" \
              --TriggerName weixin-mcp-url \
              --Type http \
              --Enable OPEN \
              --TriggerDesc "$TRIGGER_DESC"
          fi

          TRIGGERS=$(tccli scf ListTriggers --FunctionName "$SCF_FUNCTION_NAME" --Namespace "$SCF_NAMESPACE")
          SCF_URL=$(echo "$TRIGGERS" | jq -r '.Triggers[] | select(.Type == "http") | .TriggerDesc | fromjson | .NetConfig.ExtranetUrl' | head -n 1)
          test -n "$SCF_URL" || (echo "SCF Function URL was not returned" && exit 1)
          echo "url=$SCF_URL" >> "$GITHUB_OUTPUT"
          echo "SCF Function URL: $SCF_URL" >> "$GITHUB_STEP_SUMMARY"

          tccli scf GetFunction \
            --FunctionName "$SCF_FUNCTION_NAME" \
            --Namespace "$SCF_NAMESPACE"
